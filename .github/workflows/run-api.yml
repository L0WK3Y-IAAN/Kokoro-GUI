name: Host Kokoro API Server

on:
  workflow_dispatch: # Allows you to manually start the server from the Actions tab

jobs:
  run-server:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12" # Required by Kokoro/Spacy

    - name: Install System Audio Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsndfile1 espeak-ng

    - name: Setup Node.js (for Localtunnel)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Localtunnel
      run: npm install -g localtunnel

    - name: Build Environment (setup.py)
      run: |
        # Run your setup script in the background to install uv, venv, and requirements
        python setup.py > setup.log 2>&1 &
        SETUP_PID=$!
        
        echo "Waiting for setup.py to build the environment..."
        sleep 60
        
        # Kill the setup.py wrapper so it doesn't block the GitHub runner
        kill $SETUP_PID || true

    - name: Start Kokoro API Server (Background)
      run: |
        # Run the API server directly using the virtual environment setup.py created
        ./.venv/bin/python api_server.py > server.log 2>&1 &
        
        echo "Waiting for the Kokoro model to load into memory..."
        sleep 30
        
        # Verify the server started successfully
        curl -s http://127.0.0.1:8000/voices || echo "API not responding yet, check server.log if it fails"

    - name: Expose API and Keep Alive
      run: |
        # Start localtunnel and expose port 8000 to the public internet
        lt --port 8000 > tunnel.log 2>&1 &
        
        sleep 5
        # Extract the public URL generated by Localtunnel
        TUNNEL_URL=$(grep "your url is:" tunnel.log | awk '{print $4}')
        
        echo "=========================================================="
        echo "🚀 KOKORO API IS LIVE! 🚀"
        echo "🔗 API URL: $TUNNEL_URL"
        echo "=========================================================="
        echo "Copy this URL and paste it into the API_BASE variable in your index.html"
        echo "=========================================================="
        
        # Print the server log so you can confirm the model loaded correctly
        cat server.log
        
        # Keep the GitHub Action running so the server doesn't shut down
        # Note: GitHub Actions will automatically time out after 6 hours
        tail -f server.log
