name: Host Kokoro API Server

on:
  workflow_dispatch: # Allows you to manually start the server

jobs:
  run-server:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12" 

    - name: Install System Audio Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsndfile1 espeak-ng

    - name: Setup Node.js (for Localtunnel)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Localtunnel
      run: npm install -g localtunnel

    - name: Start Kokoro API (via setup.py)
      run: |
        # Run your setup script in the background
        # It handles uv, venv, requirements, AND starts the Flask server
        python setup.py > server.log 2>&1 &
        
        echo "Waiting for setup.py to build environment and start API server..."
        
        # Poll the server until it responds (max 2 minutes)
        for i in {1..24}; do
          if curl -s http://127.0.0.1:8000/voices > /dev/null; then
            echo "API Server is UP!"
            break
          fi
          echo "Waiting..."
          sleep 5
        done

    - name: Expose API and Keep Alive
      run: |
        # Start localtunnel and expose port 8000 to the public internet
        lt --port 8000 > tunnel.log 2>&1 &
        
        sleep 5
        # Extract the public URL generated by Localtunnel
        TUNNEL_URL=$(grep "your url is:" tunnel.log | awk '{print $4}')
        
        echo "=========================================================="
        echo "🚀 KOKORO API IS LIVE! 🚀"
        echo "🔗 API URL: $TUNNEL_URL"
        echo "=========================================================="
        echo "Copy this URL and paste it into the API_BASE variable in your index.html"
        echo "=========================================================="
        
        # Keep the Action running so the server doesn't shut down
        tail -f server.log
